# ──────────────────────────────────────────────────────────────
# Quarto site configuration
# ──────────────────────────────────────────────────────────────
project:
  type: website
  output-dir: docs
  
website:
  title: "SCIKIT-ROM"
  site-url: "https://scikitrom.github.io/"
  
  page-footer:
    left: "© 2025. All rights reserved."
    
  navbar:
    background: "#500000"   # Texas A&M maroon
    foreground: "white"     # Navbar text color
    collapse: true
    # mainfont: "Adobe Garamond"
    search: true
    # title: "SCIKIT-ROM"
    # subtitle: "SCIKIT-ROM"
    
    
    right:
      - icon: github
        href: "https://github.com/suparnob100/scikit-rom/tree/main"
        aria-label: GitHub
      - text: "![](/images/image_tamids.png){width=35px}"
        href: "https://tamids.tamu.edu"
        aria-label: "TAMIDS"


  sidebar:
    style: "docked"
    contents:
      - section: "**Documentation**"
        contents:
          - reference/index.qmd
          - contents:
            - reference/fom.fem_utils.qmd
            section: Full-Order Model (FOM)
          - contents:
            - reference/problem_classes.static.master_class.qmd
            - reference/problem_classes.static.master_class_parallel.qmd
            section: Problem Classes
          - contents:
            - reference/rom.deim.bilinear_form_hyperrom_deim.qmd
            - reference/rom.deim.deim.qmd
            - reference/rom.deim.linear_form_hyperrom_deim.qmd
            - reference/rom.ecsw.bilinear_form_hyperrom_ecsw.qmd
            - reference/rom.ecsw.custom_nnls.qmd
            - reference/rom.ecsw.hyperreduce.qmd
            - reference/rom.ecsw.linear_form_hyperrom_ecsw.qmd
            - reference/rom.bilinear_form_rom.qmd
            - reference/rom.linear_form_rom.qmd
            - reference/rom.rom_error_est.qmd
            - reference/rom.rom_error_est_t.qmd
            - reference/rom.rom_utils.qmd
            section: ROM
          - contents:
            - reference/templates.problem_template.bilinear_forms.qmd
            - reference/templates.problem_template.domain.qmd
            - reference/templates.problem_template.linear_forms.qmd
            - reference/templates.problem_template.params.qmd
            - reference/templates.problem_template.problem_def.qmd
            - reference/templates.problem_template.properties.qmd
            section: Templates
          - contents:
            - reference/utils.data_io.save_h5.qmd
            - reference/utils.dynamics.integrators.qmd
            - reference/utils.reduced_basis.svd.qmd
            - reference/utils.visualization.color_palette.qmd
            - reference/utils.visualization.generate_vtk.qmd
            - reference/utils.visualization.generate_vtu.qmd
            - reference/utils.visualization.plot_utils.qmd
            - reference/utils.visualization.vtuwriter.qmd
            - reference/utils.hdf5_store.qmd
            - reference/utils.imports.qmd
            - reference/utils.save_h5.qmd
            section: Utils
          - contents:
            - reference/cli.qmd
            section: CLI
      - section: "**Examples**"
        contents:
          - P3_tutorial.qmd
          - P8_tutorial.qmd
          - contents:
              - P1.qmd
              - P2.qmd
              - P3.qmd
              - P4.qmd
              - P5.qmd
              - P6.qmd
            section: Computational Mechanics
          - contents:
              - P7.qmd
              - P8.qmd
              - P9.qmd
              - P10.qmd
            section: Heat Transfer
          - contents:
              - P11.qmd
            section: Neutronics

          
extensions:
  - quarto-ext/quartodoc
  
  
format:
  html:
    theme: default
    page-layout: article
    css: styles.css
    mathjax: default
    toc: true
    toc-location: right
   
    link-external-newwindow: true
    theme-toggle: true

metadata-files:
  - reference/_sidebar.yml

execute:
  freeze: auto

editor: visual

# ──────────────────────────────────────────────────────────────
# Quartodoc configuration
# ──────────────────────────────────────────────────────────────
quartodoc:
  package: skrom
  sidebar: reference/_sidebar.yml
  css: reference/_styles-quartodoc.css

  sections:
    - title: "Full-Order Model (FOM)"
      contents:
        - fom.fem_utils

    - title: "Problem Classes"
      contents:
        - problem_classes.static.master_class
        - problem_classes.static.master_class_parallel
    
    - title: "ROM"
      contents:
        - rom.deim.bilinear_form_hyperrom_deim
        - rom.deim.deim
        - rom.deim.linear_form_hyperrom_deim
        
    - title: "ROM"
      contents:
        - rom.ecsw.bilinear_form_hyperrom_ecsw
        - rom.ecsw.custom_nnls
        - rom.ecsw.hyperreduce
        - rom.ecsw.linear_form_hyperrom_ecsw
        
    - title: "ROM"
      contents:
        - rom.bilinear_form_rom
        - rom.linear_form_rom
        - rom.rom_error_est
        - rom.rom_error_est_t
        - rom.rom_utils
        
    - title: "Templates"
      contents:
        - templates.problem_template.bilinear_forms
        - templates.problem_template.domain
        - templates.problem_template.linear_forms
        - templates.problem_template.params
        - templates.problem_template.problem_def
        - templates.problem_template.properties
        
    - title: "Utils"
      contents:
        - utils.data_io.save_h5
        - utils.dynamics.integrators
        - utils.reduced_basis.svd
        - utils.visualization.color_palette
        - utils.visualization.generate_vtk
        - utils.visualization.generate_vtu
        - utils.visualization.plot_utils
        - utils.visualization.vtuwriter
        - utils.hdf5_store
        - utils.imports
        - utils.save_h5
    
    - title: "CLI"
      contents:
        - cli